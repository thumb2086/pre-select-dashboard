<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>預選系統分析儀表板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <script src="dashboard.js"></script>
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; }
.header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: #fff; padding: 24px 32px; text-align: center; }
.header h1 { font-size: 28px; margin-bottom: 4px; }
.header p { opacity: 0.85; font-size: 14px; }
.nav { display: flex; gap: 4px; padding: 12px 16px; background: #fff; border-bottom: 1px solid #ddd; overflow-x: auto; }
.nav a { padding: 8px 16px; text-decoration: none; color: #555; border-radius: 6px; font-size: 14px; white-space: nowrap; cursor: pointer; }
.nav a:hover, .nav a.active { background: #1a73e8; color: #fff; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px 16px; }
.section { display: none; }
.section.active { display: block; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: #fff; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.stat-card .num { font-size: 36px; font-weight: 700; color: #1a73e8; }
.stat-card .label { font-size: 13px; color: #888; margin-top: 4px; }
.chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.chart-box { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.chart-box h3 { font-size: 15px; margin-bottom: 12px; color: #444; }
.chart-box.full { grid-column: 1 / -1; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #f8f9fa; padding: 10px 8px; text-align: left; border-bottom: 2px solid #dee2e6; font-weight: 600; position: sticky; top: 0; }
td { padding: 8px; border-bottom: 1px solid #eee; }
tr:hover td { background: #f5f8ff; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge-red { background: #ffe0e0; color: #d32f2f; }
.badge-orange { background: #fff3e0; color: #e65100; }
.badge-green { background: #e8f5e9; color: #2e7d32; }
.search-box { margin-bottom: 16px; }
.search-box input { width: 100%; max-width: 400px; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
.tabs { display: flex; gap: 2px; margin-bottom: 16px; }
.tab { padding: 6px 14px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 13px; border-radius: 6px; }
.tab.active { background: #1a73e8; color: #fff; border-color: #1a73e8; }
@media (max-width: 768px) { .chart-row { grid-template-columns: 1fr; } }
.dept-select { width: 100%; max-width: 300px; padding: 8px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 6px; }
</style>
</head>
<body>

<div class="header">
  <h1>預選系統分析儀表板</h1>
  <p>大安高工日間部 — 67 校系、520 筆成績資料分析</p>
</div>

<div class="nav" id="nav">
  <a class="active" onclick="showTab('overview')">總覽</a>
  <a onclick="showTab('distribution')">成績分布</a>
  <a onclick="showTab('competition')">競爭激烈度</a>
  <a onclick="showTab('date')">日期衝突</a>
  <a onclick="showTab('student')">考生排名</a>
  <a onclick="showTab('detail')">校系詳情</a>
</div>

<div class="container">

<div id="section-overview" class="section active">
  <div class="stats" id="stats"></div>
  <div class="chart-row">
    <div class="chart-box full">
      <h3>各校系預選人數 vs 招生名額</h3>
      <canvas id="chartQuota"></canvas>
    </div>
  </div>
</div>

<div id="section-distribution" class="section">
  <select class="dept-select" id="deptSelect" onchange="updateDistribution()"></select>
  <div class="chart-row">
    <div class="chart-box full">
      <h3>總分分布直方圖</h3>
      <canvas id="chartHistogram"></canvas>
    </div>
  </div>
  <div class="stats" id="deptStats" style="grid-template-columns: repeat(4, 1fr);"></div>
</div>

<div id="section-competition" class="section">
  <div class="chart-row">
    <div class="chart-box full">
      <h3>競爭激烈度排行 (預選人數 / 招生名額)</h3>
      <canvas id="chartCompetition"></canvas>
    </div>
  </div>
  <div class="chart-box full" style="overflow-x:auto;">
    <table id="compTable"><thead><tr><th>排名</th><th>校系</th><th>招生名額</th><th>預選人數</th><th>競爭比</th></tr></thead><tbody></tbody></table>
  </div>
</div>

<div id="section-date" class="section">
  <div class="chart-box full" id="dateContent"></div>
</div>

<div id="section-student" class="section">
  <div class="search-box">
    <select id="studentSelect" class="dept-select" onchange="searchStudent()">
      <option value="">— 選擇准考證號碼 —</option>
    </select>
  </div>
  <div id="studentResult"></div>
</div>

<div id="section-detail" class="section">
  <select class="dept-select" id="detailDeptSelect" onchange="updateDetail()"></select>
  <div id="detailContent"></div>
</div>

</div>


</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>預選系統分析儀表板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; }
.header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: #fff; padding: 24px 32px; text-align: center; }
.header h1 { font-size: 28px; margin-bottom: 4px; }
.header p { opacity: 0.85; font-size: 14px; }
.nav { display: flex; gap: 4px; padding: 12px 16px; background: #fff; border-bottom: 1px solid #ddd; overflow-x: auto; }
.nav a { padding: 8px 16px; text-decoration: none; color: #555; border-radius: 6px; font-size: 14px; white-space: nowrap; cursor: pointer; }
.nav a:hover, .nav a.active { background: #1a73e8; color: #fff; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px 16px; }
.section { display: none; }
.section.active { display: block; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: #fff; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.stat-card .num { font-size: 36px; font-weight: 700; color: #1a73e8; }
.stat-card .label { font-size: 13px; color: #888; margin-top: 4px; }
.chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.chart-box { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.chart-box h3 { font-size: 15px; margin-bottom: 12px; color: #444; }
.chart-box.full { grid-column: 1 / -1; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #f8f9fa; padding: 10px 8px; text-align: left; border-bottom: 2px solid #dee2e6; font-weight: 600; position: sticky; top: 0; }
td { padding: 8px; border-bottom: 1px solid #eee; }
tr:hover td { background: #f5f8ff; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge-red { background: #ffe0e0; color: #d32f2f; }
.badge-orange { background: #fff3e0; color: #e65100; }
.badge-green { background: #e8f5e9; color: #2e7d32; }
.search-box { margin-bottom: 16px; }
.search-box input { width: 100%; max-width: 400px; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
.tabs { display: flex; gap: 2px; margin-bottom: 16px; }
.tab { padding: 6px 14px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 13px; border-radius: 6px; }
.tab.active { background: #1a73e8; color: #fff; border-color: #1a73e8; }
@media (max-width: 768px) { .chart-row { grid-template-columns: 1fr; } }
.dept-select { width: 100%; max-width: 300px; padding: 8px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 6px; }
</style>
</head>
<body>

<div class="header">
  <h1>預選系統分析儀表板</h1>
  <p>大安高工日間部 — 67 校系、520 筆成績資料分析</p>
</div>

<div class="nav" id="nav">
  <a class="active" onclick="showTab('overview')">總覽</a>
  <a onclick="showTab('distribution')">成績分布</a>
  <a onclick="showTab('competition')">競爭激烈度</a>
  <a onclick="showTab('date')">日期衝突</a>
  <a onclick="showTab('student')">考生排名</a>
  <a onclick="showTab('detail')">校系詳情</a>
</div>

<div class="container">

<div id="section-overview" class="section active">
  <div class="stats" id="stats"></div>
  <div class="chart-row">
    <div class="chart-box full">
      <h3>各校系預選人數 vs 招生名額</h3>
      <canvas id="chartQuota"></canvas>
    </div>
  </div>
</div>

<div id="section-distribution" class="section">
  <select class="dept-select" id="deptSelect" onchange="updateDistribution()"></select>
  <div class="chart-row">
    <div class="chart-box full">
      <h3>總分分布直方圖</h3>
      <canvas id="chartHistogram"></canvas>
    </div>
  </div>
  <div class="stats" id="deptStats" style="grid-template-columns: repeat(4, 1fr);"></div>
</div>

<div id="section-competition" class="section">
  <div class="chart-row">
    <div class="chart-box full">
      <h3>競爭激烈度排行 (預選人數 / 招生名額)</h3>
      <canvas id="chartCompetition"></canvas>
    </div>
  </div>
  <div class="chart-box full" style="overflow-x:auto;">
    <table id="compTable"><thead><tr><th>排名</th><th>校系</th><th>招生名額</th><th>預選人數</th><th>競爭比</th></tr></thead><tbody></tbody></table>
  </div>
</div>

<div id="section-date" class="section">
  <div class="chart-box full" id="dateContent"></div>
</div>

<div id="section-student" class="section">
  <div class="search-box">
    <select id="studentSelect" class="dept-select" onchange="searchStudent()">
      <option value="">— 選擇准考證號碼 —</option>
    </select>
  </div>
  <div id="studentResult"></div>
</div>

<div id="section-detail" class="section">
  <select class="dept-select" id="detailDeptSelect" onchange="updateDetail()"></select>
  <div id="detailContent"></div>
</div>

</div>

<script>
let data = {};
let distChart = null, histChart = null, compChart = null;

async function loadData() {
  const [dist, comp, dates, students, deptNames, summary, deptDetails] = await Promise.all([
    fetch('data/score_distribution.json').then(r=>r.json()),
    fetch('data/competition.json').then(r=>r.json()),
    fetch('data/date_conflicts.json').then(r=>r.json()),
    fetch('data/student_rankings.json').then(r=>r.json()),
    fetch('data/dept_names.json').then(r=>r.json()),
    fetch('data/summary.json').then(r=>r.json()),
    fetch('data/dept_details.json').then(r=>r.json()),
  ]);
  data = { dist, comp, dates, students, deptNames, summary, deptDetails };
  renderOverview();
  renderDeptSelect();
  renderStudentSelect();
  renderDetailSelect();
  renderCompetition();
  renderDates();
}

function showTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  document.querySelector(`.nav a[onclick*="'${name}'"]`).classList.add('active');
  if (name === 'distribution' && document.getElementById('deptSelect').value) updateDistribution();
}

function renderOverview() {
  const s = data.summary;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="num">${s.total_departments}</div><div class="label">校系總數</div></div>
    <div class="stat-card"><div class="num">${s.total_students}</div><div class="label">成績總筆數</div></div>
    <div class="stat-card"><div class="num">${s.unique_students}</div><div class="label">不重複考生</div></div>
    <div class="stat-card"><div class="num">${s.dates_with_conflicts}</div><div class="label">面試日期數</div></div>
  `;
  const ctx = document.getElementById('chartQuota').getContext('2d');
  const sorted = [...data.comp].sort((a,b) => b.applicants - a.applicants).slice(0, 30);
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: sorted.map(d => d.name.replace(/^\d+/, '')),
      datasets: [
        { label: '預選人數', data: sorted.map(d => d.applicants), backgroundColor: '#1a73e8' },
        { label: '招生名額', data: sorted.map(d => d.quota), backgroundColor: '#e8a01a' },
      ]
    },
    options: { responsive: true, indexAxis: 'y', plugins: { legend: { position: 'top' } },
      scales: { x: { beginAtZero: true, ticks: { stepSize: 10 } } } }
  });
}

function renderDeptSelect() {
  const sel = document.getElementById('deptSelect');
  const names = data.deptNames;
  sel.innerHTML = Object.keys(names).sort().map(id => `<option value="${id}">${names[id]}</option>`).join('');
}

function renderStudentSelect() {
  const sel = document.getElementById('studentSelect');
  const ids = Object.keys(data.students).sort((a,b) => a.localeCompare(b, undefined, {numeric: true}));
  sel.innerHTML = '<option value="">— 選擇准考證號碼 —</option>' +
    ids.map(id => `<option value="${id}">${id}</option>`).join('');
}

function renderDetailSelect() {
  const sel = document.getElementById('detailDeptSelect');
  const names = data.deptNames;
  sel.innerHTML = Object.keys(names).sort().map(id => `<option value="${id}">${names[id]}</option>`).join('');
}

function updateDetail() {
  const id = document.getElementById('detailDeptSelect').value;
  const d = data.deptDetails[id];
  if (!d) { document.getElementById('detailContent').innerHTML = ''; return; }
  
  const sbj = ['國文','英文','數學','專一','專二'];
  const keys = ['chinese','english','math','pro1','pro2'];
  const colors = { '國文':'#4CAF50','英文':'#2196F3','數學':'#FF9800','專一':'#9C27B0','專二':'#F44336' };
  
  let html = '<div class="chart-row">';
  
  // 篩選倍率 & 加權
  html += '<div class="chart-box"><h3>篩選倍率</h3>';
  html += '<table><thead><tr><th>科目</th><th>篩選倍率</th><th>加權倍數</th></tr></thead><tbody>';
  for (let i = 0; i < 5; i++) {
    const fr = d.filter_ratios[keys[i]] || '--';
    const w = d.weight_multipliers[keys[i]] || '--';
    html += `<tr><td>${sbj[i]}</td><td><strong>${fr}</strong></td><td>x${w}</td></tr>`;
  }
  html += '</tbody></table></div>';
  
  // 基本資訊
  html += '<div class="chart-box"><h3>基本資訊</h3>';
  html += `<table><tbody>
    <tr><td>學校</td><td><strong>${d.college_name}</strong></td></tr>
    <tr><td>科系</td><td><strong>${d.name}</strong></td></tr>
    <tr><td>招生群類別</td><td>${d.category_code || '--'}</td></tr>
    <tr><td>招生名額(一般)</td><td>${d.quota_general}</td></tr>
    <tr><td>預計甄試人數</td><td>${d.expected_interviews}</td></tr>
    <tr><td>統測成績占比</td><td>${d.tcte_score_rate}%</td></tr>
    <tr><td>甄試費</td><td>${d.interview_fee} 元</td></tr>
    <tr><td>甄試日期</td><td>${d.interview_date || '--'}</td></tr>
  </tbody></table></div>';
  
  html += '</div><div class="chart-row">';
  
  // 二階段指定項目
  html += '<div class="chart-box full"><h3>第二階段指定項目</h3>';
  if (d.assign_items.length === 0) {
    html += '<p>無指定項目</p>';
  } else {
    html += '<table><thead><tr><th>項目</th><th>名稱</th><th>最低得分</th><th>占總成績比率</th></tr></thead><tbody>';
    d.assign_items.forEach((a, i) => {
      html += '<tr><td>' + (i+1) + '</td><td>' + a.name + '</td><td>' + (a.min_score || '--') + '</td><td>' + a.rate + '</td></tr>';
    });
    html += '</tbody></table>';
  }
  html += '</div>';
  
  html += '</div><div class="chart-row">';
  
  // 學習歷程上傳限制
  html += '<div class="chart-box"><h3>學習歷程上傳件數上限</h3>';
  html += '<table><thead><tr><th>項目</th><th>件數</th></tr></thead><tbody>';
  html += `<tr><td>A.修課紀錄</td><td>${d.upload_limits.A}</td></tr>`;
  html += `<tr><td>B-1.專題實作</td><td>${d.upload_limits.B1}</td></tr>`;
  html += `<tr><td>B-2.其他學習成果</td><td>${d.upload_limits.B2}</td></tr>`;
  html += `<tr><td>C.多元表現</td><td>${d.upload_limits.C}</td></tr>`;
  html += `<tr><td>D-1.多元表現綜整心得</td><td>${d.upload_limits.D1}</td></tr>`;
  html += `<tr><td>D-2.學習歷程自述</td><td>${d.upload_limits.D2}</td></tr>`;
  html += `<tr><td>D-3.其他有利審查</td><td>${d.upload_limits.D3}</td></tr>`;
  html += '</tbody></table></div>';
  
  // 同分參酌順序
  html += '<div class="chart-box"><h3>同分參酌順序</h3>';
  if (d.ref_order && d.ref_order.length > 0) {
    html += '<ol>';
    d.ref_order.forEach((r, i) => {
      if (r && r !== '--') html += `<li>${r}</li>`;
    });
    html += '</ol>';
  } else {
    html += '<p>--</p>';
  }
  html += '</div>';
  
  html += '</div>';
  
  // 備註
  if (d.notes) {
    html += `<div class="chart-box full"><h3>備註</h3><p>${d.notes}</p></div>`;
  }
  
  document.getElementById('detailContent').innerHTML = html;
}

function updateDistribution() {
  const id = document.getElementById('deptSelect').value;
  const d = data.dist[id];
  const name = data.deptNames[id];
  if (!d) return;

  document.getElementById('deptStats').innerHTML = `
    <div class="stat-card"><div class="num">${d.count}</div><div class="label">預選人數</div></div>
    <div class="stat-card"><div class="num">${d.min}</div><div class="label">最低總分</div></div>
    <div class="stat-card"><div class="num">${d.max}</div><div class="label">最高總分</div></div>
    <div class="stat-card"><div class="num">${d.avg}</div><div class="label">平均總分</div></div>
  `;

  const totals = d.totals;
  const min = Math.min(...totals), max = Math.max(...totals);
  const binSize = Math.max(1, Math.floor((max - min) / 10));
  const bins = {};
  for (let i = min; i <= max; i += binSize) {
    const key = `${i}-${i+binSize-1}`;
    bins[key] = 0;
  }
  totals.forEach(t => {
    const k = `${Math.floor((t - min) / binSize) * binSize + min}-${Math.floor((t - min) / binSize) * binSize + min + binSize - 1}`;
    if (bins[k] !== undefined) bins[k]++;
  });

  if (histChart) histChart.destroy();
  histChart = new Chart(document.getElementById('chartHistogram'), {
    type: 'bar',
    data: {
      labels: Object.keys(bins),
      datasets: [{ label: '人數', data: Object.values(bins), backgroundColor: '#1a73e8' }]
    },
    options: { responsive: true, plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
  });
}

function renderCompetition() {
  const top = data.comp.slice(0, 30);
  const ctx = document.getElementById('chartCompetition').getContext('2d');
  compChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: top.map(d => d.name.replace(/^\d+/, '')),
      datasets: [{ label: '競爭比 (預選人數/名額)', data: top.map(d => d.ratio), backgroundColor: top.map(d => d.ratio > 3 ? '#d32f2f' : d.ratio > 1.5 ? '#e65100' : '#2e7d32') }]
    },
    options: { responsive: true, indexAxis: 'y', plugins: { legend: { display: false } },
      scales: { x: { beginAtZero: true } } }
  });
  const tbody = document.querySelector('#compTable tbody');
  tbody.innerHTML = data.comp.map((d, i) => {
    const badge = d.ratio > 3 ? 'badge-red' : d.ratio > 1.5 ? 'badge-orange' : 'badge-green';
    return `<tr><td>${i+1}</td><td>${d.name}</td><td>${d.quota}</td><td>${d.applicants}</td><td><span class="badge ${badge}">${d.ratio}x</span></td></tr>`;
  }).join('');
}

function renderDates() {
  const dates = data.dates;
  const names = data.deptNames;
  let html = '<h3>面試日期衝突分析</h3>';
  for (const [date, depts] of Object.entries(dates)) {
    html += `<div class="stat-card" style="margin:12px 0;text-align:left;padding:16px;">
      <strong style="font-size:16px;color:#1a73e8;">${date}</strong> — ${depts.length} 個校系<br><br>`;
    depts.forEach(d => {
      html += `<span class="badge badge-orange" style="margin:2px;font-size:12px;">${d.name.replace(/^\d+/,'')} (${d.count}人)</span> `;
    });
    html += '</div>';
  }
  document.getElementById('dateContent').innerHTML = html;
}

function searchStudent() {
  const q = document.getElementById('studentSelect').value;
  const div = document.getElementById('studentResult');
  if (!q) { div.innerHTML = ''; return; }
  const st = data.students[q];
  if (!st) { div.innerHTML = '<p style="color:#999;">查無此准考證號</p>'; return; }
  const quotaMap = {};
  data.comp.forEach(c => { quotaMap[c.depid] = c.quota; });
  let html = `<div class="stat-card" style="text-align:left;padding:16px;"><strong>准考證號：${q}</strong> — 報名 ${st.length} 個校系</div>
  <div style="overflow-x:auto;"><table><thead><tr><th>校系</th><th>總分</th><th>大安排名</th><th>大安人數</th><th>全國招生名額</th><th>大安占比</th></tr></thead><tbody>`;
  st.forEach(s => {
    const pct = Math.round(s.rank / s.count * 100);
    const quota = quotaMap[s.depid] || 0;
    html += `<tr><td>${(data.deptNames[s.depid] || s.depid).replace(/^\d+/,'')}</td>
      <td><strong>${s.total}</strong></td><td>${s.rank}</td><td>${s.count}</td>
      <td>${quota}</td><td>${pct}%</td></tr>`;
  });
  html += '</tbody></table></div>';
  div.innerHTML = html;
}

loadData();
</script>
</body>
</html>
